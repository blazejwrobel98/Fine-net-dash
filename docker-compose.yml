# Lokalne uruchomienie. Nie wystawiaj portu publicznie bez reverse proxy i zabezpieczeń.
services:
  web:
    build: .
    image: fine-net-dash:local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/backend/data/portfolio.db
      SKIP_SCHEDULER: "0"
      # ENABLE_OPENAPI: "1"
    volumes:
      - appdata:/app/backend/data
    restart: unless-stopped

volumes:
  appdata:
