name: CI

# Każdy commit na dowolnej gałęzi + PR do main — ten sam zestaw co lokalnie.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pytest (wszystkie testy, strict)
        env:
          SKIP_SCHEDULER: "1"
        run: python -m pytest tests -v --strict-markers

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: TypeScript (bez emit)
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
