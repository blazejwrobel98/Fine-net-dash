name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/blazejwrobel98/fine-net-dash
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}

  publish-github-release:
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Obraz Docker (GHCR)

            Wklej w pole **image** w Compose, Portainerze, Kubernetes itd.:

            **`ghcr.io/blazejwrobel98/fine-net-dash:${{ github.ref_name }}`**

            Ten sam identyfikator co tag wydania (np. `v0.3.3`). Działa też **`ghcr.io/blazejwrobel98/fine-net-dash:latest`** (ostatni tag `v*` z tego workflow).

            Instrukcje uruchomienia: [docs/Docker.md](https://github.com/blazejwrobel98/Fine-net-dash/blob/${{ github.ref_name }}/docs/Docker.md).
